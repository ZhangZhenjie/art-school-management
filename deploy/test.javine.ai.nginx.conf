# /etc/nginx/sites-available/test.javine.ai
# 启用：
#   sudo ln -s /etc/nginx/sites-available/test.javine.ai /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# 然后 certbot 会自动重写本文件加上 HTTPS：
#   sudo certbot --nginx -d test.javine.ai

upstream art_school_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name test.javine.ai;

    # certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    client_max_body_size 20M;

    # ── 安全：拦截扫描请求 ────────────────────────────────────────
    location ~* \.(env|php|git|bak|sql|backup)$ { return 404; }
    location = /phpinfo.php { return 404; }
    location /actuator { return 404; }
    location /.git { return 404; }

    # ── /api → uvicorn ───────────────────────────────────────────
    location /api/ {
        proxy_pass         http://art_school_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection      "";
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ── 前端静态资源 ─────────────────────────────────────────────
    root /var/test/javine.ai/html;
    index index.html;

    # SPA fallback：未知路径都返回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 给 hashed 资源加长缓存
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
